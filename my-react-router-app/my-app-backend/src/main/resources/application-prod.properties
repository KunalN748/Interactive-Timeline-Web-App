# ============================================================
# PRODUCTION profile (Render) -> PostgreSQL
# Activated with SPRING_PROFILES_ACTIVE=prod.
# DB_* values are wired from the Render Postgres instance (see render.yaml).
# ============================================================

# Build the JDBC URL from the database connection parts Render exposes.
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# CORS: hardcode the Vercel frontend origin. Intentionally NOT reading the
# ALLOWED_ORIGINS env var, because a stray/empty dashboard value was overriding
# it. To change the allowed origin, edit this line. Comma-separate for multiple.
app.cors.allowed-origins=https://interactive-timeline-web-app-pden.vercel.app

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Disable the H2 console in production.
spring.h2.console.enabled=false
