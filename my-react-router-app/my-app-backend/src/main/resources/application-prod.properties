# ============================================================
# PRODUCTION profile (Render) -> PostgreSQL
# Activated with SPRING_PROFILES_ACTIVE=prod.
# DB_* values are wired from the Render Postgres instance (see render.yaml).
# ============================================================

# Build the JDBC URL from the database connection parts Render exposes.
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# CORS: default to the Vercel frontend so it works without relying on a
# Render dashboard env var. ALLOWED_ORIGINS still overrides this if set.
app.cors.allowed-origins=${ALLOWED_ORIGINS:https://interactive-timeline-web-app-pden.vercel.app}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Disable the H2 console in production.
spring.h2.console.enabled=false
