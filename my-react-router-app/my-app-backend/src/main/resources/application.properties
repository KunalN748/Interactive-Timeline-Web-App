# ============================================================
# Default profile = LOCAL DEVELOPMENT (H2 file-based database)
# Production overrides live in application-prod.properties
# (activated with SPRING_PROFILES_ACTIVE=prod on Render).
# ============================================================

# Server port. Render injects PORT at runtime; defaults to 8080 locally.
server.port=${PORT:8080}

# Allowed CORS origins (comma-separated). Override with ALLOWED_ORIGINS in prod.
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# Logging
logging.level.com.spring.my_app_backend=INFO
logging.level.org.springframework.web=INFO

# --- Local datasource: H2 in FILE mode so data survives restarts ---
# Stored under ./data/timelinedb.* relative to where the app is launched.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/timelinedb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# H2 web console (local convenience): http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
# ddl-auto=update keeps the schema in sync with the @Entity model.
# Dialect is auto-detected from the JDBC URL, so this config also works for Postgres.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
